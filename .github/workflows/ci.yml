name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAMES: |
    gateway
    fake-backend
    client

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose -f docker-compose.yml up -d --build
        env:
          MONGO_URL: mongodb://mongo:27017/ledger
          REDIS_URL: redis://redis:6379

      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/health && break
            sleep 2
          done

      - name: Register API key
        run: |
          KEY=$(curl -sf -X POST http://localhost:5000/register \
            -H "Content-Type: application/json" \
            -d '{"backendUrl":"http://fake-backend:5001"}' | jq -r .key)
          echo "KEY=$KEY" >> $GITHUB_ENV

      - name: Test proxy
        run: |
          curl -sf http://localhost:5000/api/test \
            -H "x-api-key: ${{ env.KEY }}" | jq -e '.message == "ok"'

      - name: Test rate limiter
        run: |
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost:5000/api/test -H "x-api-key: ${{ env.KEY }}")
            if [ "$STATUS" = "429" ]; then break; fi
          done
          [ "$STATUS" = "429" ]

      - name: Test billing
        run: |
          curl -sf http://localhost:5000/billing/${{ env.KEY }} | jq -e '.usageCount >= 10'

      - name: Verify counts match
        run: |
          docker exec ledger-mongo mongosh ledger --quiet \
            --eval "db.usagelogs.countDocuments({status:'complete'})" \
            | grep -q "1[0-9]"

      - name: Stop services
        run: docker compose -f docker-compose.yml down -v

  build:
    needs: [test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gateway
        uses: docker/build-push-action@v6
        with:
          context: ./services/gateway
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/gateway:latest,${{ env.REGISTRY }}/${{ github.repository }}/gateway:${{ github.sha }}

      - name: Build and push fake-backend
        uses: docker/build-push-action@v6
        with:
          context: ./services/fake-backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/fake-backend:latest,${{ env.REGISTRY }}/${{ github.repository }}/fake-backend:${{ github.sha }}

      - name: Build and push client
        uses: docker/build-push-action@v6
        with:
          context: ./services/client
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/client:latest,${{ env.REGISTRY }}/${{ github.repository }}/client:${{ github.sha }}
