version: "3.9"

services:

  mongo:
    image: mongo:7
    container_name: ledger-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"

  redis:
    image: redis:7
    container_name: ledger-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  fake-backend:
    build:
      context: ./services/fake-backend
    container_name: fake-backend
    ports:
      - "5001:5001"

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - gateway-1
      - gateway-2

  client:
    build:
      context: ./services/client
    ports:
      - "5173:5173"
    environment:
      PROXY_TARGET: http://nginx:80
    depends_on:
      - nginx

  gateway-1:
    build:
      context: ./services/gateway
    depends_on:
      - mongo
      - redis
      - fake-backend
    environment:
      PORT: 5000
      MONGO_URL: mongodb://mongo:27017/ledger
      REDIS_URL: redis://redis:6379
      DEFAULT_BACKEND_URL: http://fake-backend:5001

  gateway-2:
    build:
      context: ./services/gateway
    depends_on:
      - mongo
      - redis
      - fake-backend
    environment:
      PORT: 5000
      MONGO_URL: mongodb://mongo:27017/ledger
      REDIS_URL: redis://redis:6379
      DEFAULT_BACKEND_URL: http://fake-backend:5001