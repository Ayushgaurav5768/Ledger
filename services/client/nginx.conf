server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  location /api {
    proxy_pass http://nginx:80;
  }

  location /register {
    proxy_pass http://nginx:80;
  }

  location /billing {
    proxy_pass http://nginx:80;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
